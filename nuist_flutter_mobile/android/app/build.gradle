plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

apply plugin: "kotlin-android"

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.example.nuist_flutter_mobile"
    compileSdkVersion 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        debug.assets.srcDirs += "${buildDir}/generated/flutter_assets/debug"
        profile.assets.srcDirs += "${buildDir}/generated/flutter_assets/profile"
        release.assets.srcDirs += "${buildDir}/generated/flutter_assets/release"
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.example.nuist_flutter_mobile"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 34
        ndk {
            abiFilters 'arm64-v8a'
        }
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {}

def flutterSdkPath = localProperties.getProperty('flutter.sdk')
project.ext.flutterExecutablePathCustom = "${flutterSdkPath}/bin/flutter"
project.ext.flutterProjectRootCustom = rootProject.projectDir.parentFile

def registerManualFlutterAssetsTask(String variantName, String buildMode, String targetPlatform, String ruleName, boolean trackWidgetCreation) {
    def capitalizedVariant = variantName.capitalize()
    def outputDir = file("${buildDir}/generated/flutter_assets/${variantName}")
    def depfile = "${outputDir}/flutter_build.d"
    def flutterExec = project.ext.flutterExecutablePathCustom
    def flutterRootDir = project.ext.flutterProjectRootCustom
    def targetFile = "${project.ext.flutterProjectRootCustom}/lib/main.dart"
    def pubspecFile = "${project.ext.flutterProjectRootCustom}/pubspec.yaml"

    tasks.register("generateManualFlutterAssets${capitalizedVariant}", Exec) {
        workingDir flutterRootDir
        commandLine flutterExec,
            "assemble",
            "--no-version-check",
            "--depfile", depfile,
            "--output", outputDir.absolutePath,
            "-dTargetFile=lib/main.dart",
            "-dTargetPlatform=${targetPlatform}",
            "-dBuildMode=${buildMode}",
            "-dTrackWidgetCreation=${trackWidgetCreation}",
            ruleName
        inputs.file(targetFile)
        inputs.file(pubspecFile)
        outputs.dir(outputDir)
    }
}

registerManualFlutterAssetsTask(
    "debug",
    "debug",
    "android",
    "debug_android_application",
    true
)

registerManualFlutterAssetsTask(
    "profile",
    "profile",
    "android-arm64",
    "android_aot_bundle_profile_android-arm64",
    false
)

registerManualFlutterAssetsTask(
    "release",
    "release",
    "android-arm64",
    "android_aot_bundle_release_android-arm64",
    false
)

afterEvaluate {
    ["Debug", "Profile", "Release"].each { variant ->
        tasks.named("merge${variant}Assets") {
            dependsOn "generateManualFlutterAssets${variant}"
        }
    }
}
