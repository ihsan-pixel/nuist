name: nuist_flutter
description: A native Flutter mobile client for the Nuist Laravel backend.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter_riverpod: ^3.2.1
  flutter_secure_storage: ^10.0.0
  go_router: ^16.3.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
